<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#C9A84C">
<title>Dashboard — Belleza Integral</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=Outfit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- Styles -->
<link rel="stylesheet" href="css/styles.css">
<style>
.dashboard-container { max-width: 1200px; margin: 0 auto; padding: 32px; }
.dashboard-header { text-align: center; margin-bottom: 40px; }
.dashboard-header h1 { font-family: var(--font-display); color: var(--text); margin-bottom: 8px; }
.dashboard-header p { color: var(--muted); }

.dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; margin-bottom: 40px; }

.dashboard-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 24px; box-shadow: var(--shadow); }
.dashboard-card h3 { font-family: var(--font-display); color: var(--gold); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; }
.stat-item { text-align: center; padding: 16px; background: var(--bg); border-radius: 8px; }
.stat-item .number { font-size: 32px; font-weight: 700; color: var(--gold); font-family: var(--font-display); }
.stat-item .label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

.quick-actions { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
.quick-action-btn { padding: 16px; background: linear-gradient(135deg, var(--gold), var(--gold-dk)); color: #fff; border: none; border-radius: 8px; font-family: var(--font-body); font-weight: 600; cursor: pointer; transition: all .3s; text-align: center; }
.quick-action-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(201, 168, 76, .3); }

.recent-bookings { margin-top: 32px; }
.recent-bookings h3 { margin-bottom: 16px; }
.booking-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
.booking-item:last-child { border-bottom: none; }
.booking-info h4 { margin: 0; font-size: 16px; color: var(--text); }
.booking-info p { margin: 4px 0 0 0; font-size: 13px; color: var(--muted); }
.booking-status { padding: 4px 12px; border-radius: 99px; font-size: 11px; font-weight: 600; }
.status-confirmed { background: rgba(39, 174, 96, .12); color: #27AE60; }
.status-pending { background: rgba(241, 196, 15, .15); color: #D4860D; }
.status-cancelled { background: rgba(231, 76, 60, .12); color: #E74C3C; }

.back-to-site { position: fixed; top: 20px; left: 20px; padding: 12px 20px; background: var(--card); border: 1px solid var(--border); border-radius: 99px; color: var(--text); text-decoration: none; font-size: 14px; font-weight: 500; box-shadow: var(--shadow); transition: all .3s; }
.back-to-site:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,.1); }
</style>
</head>
<body>

<a href="index.html" class="back-to-site">← Volver al sitio</a>

<div class="dashboard-container">
  <div class="dashboard-header">
    <h1>💅 Dashboard Administrativo</h1>
    <p>Belleza Integral — Panel de control</p>
  </div>

  <div class="dashboard-grid">
    <div class="dashboard-card">
      <h3>📊 Estadísticas</h3>
      <div class="stats-grid" id="statsGrid">
        <div class="stat-item">
          <div class="number" id="statToday">0</div>
          <div class="label">Reservas Hoy</div>
        </div>
        <div class="stat-item">
          <div class="number" id="statTotal">0</div>
          <div class="label">Total Reservas</div>
        </div>
        <div class="stat-item">
          <div class="number" id="statServices">9</div>
          <div class="label">Servicios</div>
        </div>
        <div class="stat-item">
          <div class="number" id="statClients">0</div>
          <div class="label">Clientes</div>
        </div>
      </div>
    </div>

    <div class="dashboard-card">
      <h3>⚡ Acciones Rápidas</h3>
      <div class="quick-actions">
        <button class="quick-action-btn" onclick="openAdminPanel()">📅 Gestionar Reservas</button>
        <button class="quick-action-btn" onclick="viewServices()">💅 Ver Servicios</button>
        <button class="quick-action-btn" onclick="viewClients()">👥 Ver Clientes</button>
        <button class="quick-action-btn" onclick="sendTestEmail()">📧 Email de Prueba</button>
      </div>
    </div>
  </div>

  <div class="dashboard-card recent-bookings">
    <h3>📅 Reservas Recientes</h3>
    <div id="recentBookings">
      <p style="color: var(--muted); text-align: center; padding: 32px;">Cargando reservas...</p>
    </div>
  </div>
</div>

<!-- ADMIN PANEL MODAL (same as main site) -->
<div class="admin-overlay" id="adminOverlay" style="display: none;">
  <div class="admin-panel">
    <div class="admin-head">
      <h2>💅 Panel Admin</h2>
      <button class="modal-close" onclick="closeAdmin()">&times;</button>
    </div>
    <div class="admin-body" id="adminBody">
      <!-- Login or content -->
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="js/api.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
// DASHBOARD — Admin Dashboard Logic
// ═══════════════════════════════════════════════════════════════

let dashboardState = {
  reservas: [],
  adminLogged: false
};

const ADMIN_TOKEN = 'liz2026';

document.addEventListener('DOMContentLoaded', async () => {
  // Check if admin is logged in (from sessionStorage)
  const loggedIn = sessionStorage.getItem('adminLogged') === 'true';
  if (loggedIn) {
    dashboardState.adminLogged = true;
    await loadDashboardData();
  } else {
    showLoginPrompt();
  }
});

async function loadDashboardData() {
  try {
    // Load reservations
    const response = await API.getReservas(ADMIN_TOKEN);
    if (response.ok && response.reservas) {
      dashboardState.reservas = response.reservas;
    } else {
      // Fallback to demo data
      dashboardState.reservas = [
        { id:'RES-A1B2C3D4', nombre:'María González', email:'maria@email.com', servicio:'Manicure Permanente', fecha:'2026-04-01', hora:'14:00', estado:'Confirmada' },
        { id:'RES-E5F6G7H8', nombre:'Ana López', email:'ana@email.com', servicio:'Coloración', fecha:'2026-04-02', hora:'10:00', estado:'Pendiente' },
      ];
    }

    updateStats();
    renderRecentBookings();
  } catch(e) {
    console.log('Using demo data');
    dashboardState.reservas = [
      { id:'RES-A1B2C3D4', nombre:'María González', email:'maria@email.com', servicio:'Manicure Permanente', fecha:'2026-04-01', hora:'14:00', estado:'Confirmada' },
      { id:'RES-E5F6G7H8', nombre:'Ana López', email:'ana@email.com', servicio:'Coloración', fecha:'2026-04-02', hora:'10:00', estado:'Pendiente' },
    ];
    updateStats();
    renderRecentBookings();
  }
}

function updateStats() {
  const today = new Date().toISOString().split('T')[0];
  const todayCount = dashboardState.reservas.filter(r => r.fecha === today && r.estado === 'Confirmada').length;
  const totalRes = dashboardState.reservas.length;

  document.getElementById('statToday').textContent = todayCount;
  document.getElementById('statTotal').textContent = totalRes;
  document.getElementById('statClients').textContent = new Set(dashboardState.reservas.map(r => r.email)).size;
}

function renderRecentBookings() {
  const recent = dashboardState.reservas.slice(0, 10); // Last 10
  const container = document.getElementById('recentBookings');

  if (recent.length === 0) {
    container.innerHTML = '<p style="color: var(--muted); text-align: center; padding: 32px;">No hay reservas recientes</p>';
    return;
  }

  container.innerHTML = recent.map(r => {
    const statusClass = r.estado === 'Confirmada' ? 'status-confirmed' : r.estado === 'Cancelada' ? 'status-cancelled' : 'status-pending';
    return `
      <div class="booking-item">
        <div class="booking-info">
          <h4>${r.nombre}</h4>
          <p>${r.servicio} • ${r.fecha} ${r.hora}</p>
        </div>
        <div class="booking-status ${statusClass}">${r.estado}</div>
      </div>
    `;
  }).join('');
}

function showLoginPrompt() {
  const password = prompt('Ingresa el token de administrador:');
  if (password === ADMIN_TOKEN) {
    dashboardState.adminLogged = true;
    sessionStorage.setItem('adminLogged', 'true');
    loadDashboardData();
    showToast('Bienvenida Liz 💅', 'success');
  } else {
    alert('Token incorrecto');
    location.href = 'index.html';
  }
}

function openAdminPanel() {
  if (!dashboardState.adminLogged) {
    showLoginPrompt();
    return;
  }
  document.getElementById('adminOverlay').style.display = 'flex';
  renderAdminDashboard();
}

function closeAdmin() {
  document.getElementById('adminOverlay').style.display = 'none';
}

async function renderAdminDashboard() {
  // Use the same logic as in app.js
  const today = new Date().toISOString().split('T')[0];
  const todayCount = dashboardState.reservas.filter(r => r.fecha === today).length;
  const totalRes = dashboardState.reservas.length;

  let html = `
    <div class="admin-stats">
      <div class="admin-stat"><div class="num">${todayCount}</div><div class="lbl">Reservas Hoy</div></div>
      <div class="admin-stat"><div class="num">${totalRes}</div><div class="lbl">Total Reservas</div></div>
      <div class="admin-stat"><div class="num">9</div><div class="lbl">Servicios</div></div>
      <div class="admin-stat"><div class="num">1</div><div class="lbl">Empleados</div></div>
    </div>

    <h3 style="font-family:var(--font-display);font-size:20px;margin-bottom:16px;color:var(--gold)">📅 Reservas</h3>
    <div style="overflow-x:auto;margin-bottom:28px">
      <table class="admin-table">
        <thead><tr><th>ID</th><th>Cliente</th><th>Servicio</th><th>Fecha</th><th>Hora</th><th>Estado</th><th>Acciones</th></tr></thead>
        <tbody>`;

  dashboardState.reservas.forEach((r, i) => {
    const badgeCls = r.estado === 'Confirmada' ? 'badge-ok' : r.estado === 'Cancelada' ? 'badge-cancel' : 'badge-pending';
    const canReschedule = canRescheduleCheck(r);
    html += `<tr>
      <td style="font-family:monospace;font-size:12px">${r.id}</td>
      <td>${r.nombre}<br><span style="font-size:11px;color:var(--muted)">${r.email}</span></td>
      <td>${r.servicio}</td>
      <td>${r.fecha}</td>
      <td>${r.hora}</td>
      <td><span class="badge ${badgeCls}">${r.estado}</span></td>
      <td>
        ${r.estado !== 'Cancelada' ? `
          <button class="admin-btn danger" style="margin-right:4px;font-size:11px;padding:4px 10px" onclick="adminCancel(${i})">Cancelar</button>
          ${canReschedule ? `<button class="admin-btn" style="font-size:11px;padding:4px 10px" onclick="adminReschedule(${i})">Reagendar</button>` : ''}
        ` : '<span style="color:var(--muted);font-size:12px">—</span>'}
      </td>
    </tr>`;
  });

  html += `</tbody></table></div>
    <button class="admin-btn" style="margin-top:16px" onclick="logout()">🔒 Cerrar Sesión</button>`;

  document.getElementById('adminBody').innerHTML = html;
}

function canRescheduleCheck(r) {
  const resDate = new Date(r.fecha + 'T' + r.hora);
  const now = new Date();
  const diffHours = (resDate - now) / (1000 * 60 * 60);
  return diffHours > 48;
}

async function adminCancel(i) {
  if (!confirm('¿Cancelar esta reserva? Se enviará un correo de disculpas al cliente.')) return;

  const r = dashboardState.reservas[i];
  try {
    const response = await API.cancelarReserva(r.id, ADMIN_TOKEN);
    if (response.ok) {
      dashboardState.reservas[i].estado = 'Cancelada';
      showToast(`Reserva cancelada. Correo de disculpas enviado a ${r.email}`, 'success');
      renderAdminDashboard();
      updateStats();
      renderRecentBookings();
    } else {
      showToast(response.error || 'Error al cancelar', 'error');
    }
  } catch(e) {
    // Fallback to demo
    dashboardState.reservas[i].estado = 'Cancelada';
    showToast(`Reserva cancelada (demo). Correo simulado enviado a ${r.email}`, 'success');
    renderAdminDashboard();
    updateStats();
    renderRecentBookings();
  }
}

async function adminReschedule(i) {
  const r = dashboardState.reservas[i];
  if (!canRescheduleCheck(r)) {
    showToast('No se puede reagendar con menos de 48 horas de anticipación. Se pierde el valor abonado.', 'error');
    return;
  }
  const newDate = prompt('Nueva fecha (YYYY-MM-DD):', r.fecha);
  if (!newDate) return;
  const newHora = prompt('Nueva hora (HH:MM):', r.hora);
  if (!newHora) return;

  try {
    const response = await API.reagendarReserva(r.id, newDate, newHora, ADMIN_TOKEN);
    if (response.ok) {
      dashboardState.reservas[i].fecha = newDate;
      dashboardState.reservas[i].hora = newHora;
      showToast('Reserva reagendada. Se notificará al cliente por correo.', 'success');
      renderAdminDashboard();
    } else {
      showToast(response.error || 'Error al reagendar', 'error');
    }
  } catch(e) {
    // Fallback to demo
    dashboardState.reservas[i].fecha = newDate;
    dashboardState.reservas[i].hora = newHora;
    showToast('Reserva reagendada (demo). Correo simulado enviado.', 'success');
    renderAdminDashboard();
  }
}

function viewServices() {
  alert('Para editar servicios, modifica directamente en la Google Sheet.');
}

function viewClients() {
  alert('Los clientes se registran automáticamente al crear reservas.');
}

function sendTestEmail() {
  const email = prompt('Email de destino para prueba:');
  if (email) {
    // This would need to be implemented in the backend
    alert('Función no implementada en el frontend. Usa el menú de Google Sheets.');
  }
}

function logout() {
  dashboardState.adminLogged = false;
  sessionStorage.removeItem('adminLogged');
  location.reload();
}

// ── TOAST ─────────────────────────────────────────────
function showToast(msg, type='error') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 3500);
}
</script>

</body>
</html>
